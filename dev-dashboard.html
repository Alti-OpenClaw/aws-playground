<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWS Playground — Dev Loop Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif; background: #0a0a0f; color: #e4e4e7; padding: 24px; min-height: 100vh; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .badge { background: #22c55e20; color: #22c55e; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .header .badge.stopped { background: #ef444420; color: #ef4444; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 16px; }
  .card h2 { font-size: 12px; font-weight: 600; color: #71717a; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .score-big { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .score-target { font-size: 14px; color: #71717a; margin-top: 4px; }
  .progress-bar { width: 100%; height: 8px; background: #27272a; border-radius: 4px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 4px; transition: width 0.5s ease; }
  .section-scores { display: grid; grid-template-columns: 1fr; gap: 6px; }
  .section-row { display: flex; align-items: center; gap: 8px; }
  .section-label { font-size: 12px; color: #a1a1aa; flex: 1; }
  .section-score { font-size: 12px; font-weight: 600; color: #e4e4e7; width: 45px; text-align: right; }
  .section-bar { width: 80px; height: 6px; background: #27272a; border-radius: 3px; overflow: hidden; }
  .section-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .task-current { background: #3b82f610; border: 1px solid #3b82f630; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .task-current .label { font-size: 10px; color: #3b82f6; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .task-current .text { font-size: 13px; color: #e4e4e7; margin-top: 4px; }
  .commits { list-style: none; }
  .commits li { font-size: 12px; padding: 6px 0; border-bottom: 1px solid #27272a; display: flex; gap: 8px; }
  .commits li:last-child { border-bottom: none; }
  .commits .hash { color: #8b5cf6; font-family: 'SF Mono', monospace; font-size: 11px; }
  .commits .msg { color: #a1a1aa; }
  .full-width { grid-column: 1 / -1; }
  .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .updated { font-size: 10px; color: #52525b; margin-top: 8px; }
  .empty { color: #52525b; font-size: 12px; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <h1>🏗️ AWS Playground Dev Loop</h1>
  <span class="badge" id="statusBadge"><span class="pulse"></span>&nbsp; Waiting for data...</span>
</div>

<div class="grid">
  <!-- Overall Score -->
  <div class="card">
    <h2>Overall Score</h2>
    <div class="score-big" id="overallScore">—</div>
    <div class="score-target">Target: 90 / 100</div>
    <div class="progress-bar"><div class="progress-fill" id="overallBar" style="width: 0%"></div></div>
  </div>

  <!-- Current Task -->
  <div class="card">
    <h2>Current Task</h2>
    <div class="task-current">
      <div class="label" id="taskLabel">Waiting...</div>
      <div class="text" id="taskText">Sub-agent initializing...</div>
    </div>
    <div class="updated" id="lastUpdated"></div>
  </div>

  <!-- Section Scores -->
  <div class="card">
    <h2>Section Scores</h2>
    <div class="section-scores" id="sectionScores">
      <div class="empty">Waiting for first evaluation...</div>
    </div>
  </div>

  <!-- Commits This Run -->
  <div class="card">
    <h2>Commits This Run</h2>
    <ul class="commits" id="commitList">
      <li class="empty">No commits yet this run</li>
    </ul>
  </div>

  <!-- Progress Log -->
  <div class="card full-width">
    <h2>Progress</h2>
    <div id="progressLog" style="font-size: 12px; color: #a1a1aa; white-space: pre-wrap; max-height: 200px; overflow-y: auto;">
      Waiting for sub-agent to start...
    </div>
  </div>
</div>

<script>
  // This dashboard is updated via canvas eval calls from the main agent
  window.updateDashboard = function(data) {
    if (data.running !== undefined) {
      const badge = document.getElementById('statusBadge');
      if (data.running) {
        badge.innerHTML = '<span class="pulse"></span>&nbsp; Running';
        badge.className = 'badge';
      } else {
        badge.innerHTML = '⏹ Stopped';
        badge.className = 'badge stopped';
      }
    }
    if (data.score !== undefined) {
      document.getElementById('overallScore').textContent = data.score;
      document.getElementById('overallBar').style.width = data.score + '%';
    }
    if (data.currentTask) {
      document.getElementById('taskLabel').textContent = 'Current Task';
      document.getElementById('taskText').textContent = data.currentTask;
    }
    if (data.sections) {
      const container = document.getElementById('sectionScores');
      const colors = { 0: '#ef4444', 30: '#f59e0b', 60: '#3b82f6', 80: '#22c55e' };
      const getColor = (s) => { let c = '#ef4444'; for (const [t, cl] of Object.entries(colors)) { if (s >= +t) c = cl; } return c; };
      container.innerHTML = data.sections.map(s =>
        `<div class="section-row">
          <span class="section-label">${s.name}</span>
          <span class="section-score">${s.score}/100</span>
          <div class="section-bar"><div class="section-fill" style="width:${s.score}%;background:${getColor(s.score)}"></div></div>
        </div>`
      ).join('');
    }
    if (data.commits) {
      const list = document.getElementById('commitList');
      if (data.commits.length === 0) {
        list.innerHTML = '<li class="empty">No commits yet this run</li>';
      } else {
        list.innerHTML = data.commits.map(c =>
          `<li><span class="hash">${c.hash}</span><span class="msg">${c.msg}</span></li>`
        ).join('');
      }
    }
    if (data.progress) {
      document.getElementById('progressLog').textContent = data.progress;
    }
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  };
</script>
</body>
</html>
